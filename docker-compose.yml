version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama_proxy:
    image: nginx:alpine
    container_name: ollama_proxy
    restart: unless-stopped
    ports:
      - "11434:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama
    networks:
      - dokploy-network

volumes:
  ollama_data:

networks:
  dokploy-network:
    external: true